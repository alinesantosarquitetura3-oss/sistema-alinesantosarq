<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aline Santos Arquitetos Associados — Sistema do Escritório</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#243810;--green-deep:#1b2b0c;--gold:#995515;--gold-soft:#b9743a;--paper:#f6f3ec;--muted:#c9c4b4;--line:rgba(246,243,236,.16);}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--paper);-webkit-font-smoothing:antialiased;
    min-height:100vh;background:
      radial-gradient(1200px 600px at 50% -10%, #2c481a 0%, transparent 60%),
      var(--green);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px}
  .wrap{width:100%;max-width:860px;text-align:center}
  .logo{height:70px;width:auto;margin-bottom:14px}
  .kicker{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px}
  h1{font-weight:600;font-size:26px;letter-spacing:-.01em;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14.5px;margin:0 0 40px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{display:flex;align-items:center;gap:16px;text-align:left;text-decoration:none;color:var(--paper);
    background:rgba(246,243,236,.05);border:1px solid var(--line);border-radius:16px;padding:22px 22px;
    transition:transform .12s ease,background .15s ease,border-color .15s ease}
  .card:hover{transform:translateY(-3px);background:rgba(246,243,236,.09);border-color:var(--gold-soft)}
  .card.is-soon{opacity:.55;cursor:default}
  .card.is-soon:hover{transform:none;background:rgba(246,243,236,.05);border-color:var(--line)}
  .ic{flex:none;width:50px;height:50px;border-radius:12px;background:rgba(153,85,21,.18);
    display:flex;align-items:center;justify-content:center;color:var(--gold-soft)}
  .ic svg{width:26px;height:26px}
  .ct h2{font-size:16.5px;font-weight:600;margin:0 0 3px}
  .ct p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.4}
  .soon{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--green-deep);
    background:var(--gold-soft);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  footer{margin-top:38px;font-size:11.5px;color:var(--muted);letter-spacing:.02em}
  footer a{color:var(--gold-soft);text-decoration:none}
  @media (max-width:640px){.grid{grid-template-columns:1fr}h1{font-size:22px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

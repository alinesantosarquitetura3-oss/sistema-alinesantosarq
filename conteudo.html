<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Conteúdo — Aline Santos Arquitetos Associados</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --green:#243810;--green-deep:#1b2b0c;--gold:#995515;--gold-soft:#b9743a;
    --paper:#f6f3ec;--ink:#20231c;--muted:#6f6a5c;--line:#e4ddce;--ui-bg:#ece7dc;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--ui-bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .top{background:var(--green);color:var(--paper);padding:20px 26px}
  .top .row{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .back{color:#e7c9a6;text-decoration:none;font-size:13px;font-weight:600}
  .top h1{font-size:18px;font-weight:700;margin:0}
  .top .kicker{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#e7c9a6;margin-top:2px}

  .app{max-width:1280px;margin:0 auto;padding:26px;display:grid;grid-template-columns:340px 1fr;gap:24px}

  /* seletor de templates */
  .fmt-tabs{display:flex;gap:8px;margin-bottom:16px}
  .fmt-tab{flex:1;text-align:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:8px 10px;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s,background .15s}
  .fmt-tab:hover{border-color:var(--gold-soft)}
  .fmt-tab.active{background:var(--gold);border-color:var(--gold);color:#fff}
  .tpl-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
  .tpl-tab{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);transition:border-color .15s,color .15s,background .15s}
  .tpl-tab .ic{display:block;font-size:18px;margin-bottom:4px}
  .tpl-tab:hover{border-color:var(--gold-soft)}
  .tpl-tab.active{background:var(--green);border-color:var(--green);color:#fff}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
  .panel h2{font-size:14px;margin:0 0 14px;color:var(--green)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
  .field .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
  input[type=text],textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13.5px;background:#fcfbf7;color:var(--ink)}
  input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(153,85,21,.12)}
  textarea{resize:vertical}
  .filebtn{display:flex;align-items:center;gap:10px}
  .filebtn input[type=file]{font-size:12px}
  .thumb{width:40px;height:40px;border-radius:6px;background-size:cover;background-position:center;border:1px solid var(--line);flex:none}

  .actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  button{font-family:inherit;font-size:13px;font-weight:600;border-radius:9px;padding:11px 16px;border:1px solid var(--green);cursor:pointer;background:transparent;color:var(--green)}
  button.primary{background:var(--green);color:#fff}
  button.primary:hover{background:var(--green-deep)}
  button:hover{background:rgba(36,56,16,.06)}
  button:disabled{opacity:.5;cursor:wait}

  .caption-box{margin-top:18px}
  .caption-box textarea{min-height:110px}

  /* palco / preview */
  .stage{display:flex;flex-direction:column;align-items:center;gap:16px}
  .stage-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);align-self:flex-start}
  .preview-wrap{overflow:hidden;border-radius:10px;box-shadow:0 14px 34px rgba(20,25,15,.18);position:relative;background:#000}
  .preview-scale{transform-origin:top left}

  /* ---- POST BASE (1080x1080) ---- */
  .post{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;font-family:'Inter',sans-serif}
  .post .logo-mark{position:absolute;left:64px;bottom:56px;height:34px}
  .post .handle{position:absolute;right:64px;bottom:64px;font-size:20px;letter-spacing:.02em;font-weight:600}
  .post .eyebrow{font-size:20px;letter-spacing:.24em;text-transform:uppercase;font-weight:700}

  /* Citação */
  .post.citacao{background:var(--green);color:var(--paper);align-items:center;justify-content:center;text-align:center;padding:120px 110px}
  .post.citacao .mark{font-family:'Cormorant Garamond',serif;font-size:120px;color:var(--gold-soft);line-height:.5;margin-bottom:24px}
  .post.citacao .frase{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:56px;line-height:1.28;color:var(--paper)}
  .post.citacao .autor{margin-top:40px;font-size:22px;color:var(--gold-soft);font-weight:600;letter-spacing:.02em}
  .post.citacao .handle{color:#e7c9a6}

  /* Pergunta */
  .post.pergunta{background:var(--paper);color:var(--green);align-items:center;justify-content:center;text-align:center;padding:120px 100px}
  .post.pergunta .eyebrow{color:var(--gold);margin-bottom:36px}
  .post.pergunta .pergunta-txt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.2;color:var(--green)}
  .post.pergunta .cta{margin-top:44px;display:inline-block;background:var(--green);color:var(--paper);font-size:22px;font-weight:600;padding:16px 34px;border-radius:40px}
  .post.pergunta .handle{color:var(--gold-soft)}

  /* Antes e Depois */
  .post.antesdepois{background:var(--paper)}
  .post.antesdepois .head{padding:52px 64px 26px;text-align:center}
  .post.antesdepois .head .eyebrow{color:var(--gold);font-size:18px;margin-bottom:10px}
  .post.antesdepois .head .titulo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:44px;color:var(--green)}
  .post.antesdepois .head .local{font-size:16px;color:var(--muted);margin-top:6px}
  .post.antesdepois .photos{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;position:relative}
  .post.antesdepois .photos .ph{background-size:cover;background-position:center;position:relative}
  .post.antesdepois .photos .ph .tag{position:absolute;bottom:20px;left:20px;background:rgba(36,56,16,.88);color:#fff;font-size:16px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;padding:8px 18px;border-radius:6px}
  .post.antesdepois .photos::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:4px;background:var(--gold);transform:translateX(-50%)}
  .post.antesdepois .foot{padding:22px 64px;display:flex;align-items:center;justify-content:space-between}
  .post.antesdepois .logo-mark{position:static;height:28px}
  .post.antesdepois .handle{position:static;color:var(--muted);font-size:18px}

  /* Dica rápida */
  .post.dica{background:var(--green);color:var(--paper);padding:100px 100px 0;justify-content:center}
  .post.dica .numero{font-family:'Cormorant Garamond',serif;font-size:150px;color:var(--gold-soft);opacity:.5;line-height:1;margin-bottom:0}
  .post.dica .eyebrow{color:var(--gold-soft);margin-bottom:18px}
  .post.dica .titulo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:52px;color:var(--paper);margin-bottom:26px;line-height:1.2}
  .post.dica .texto{font-size:28px;line-height:1.55;color:#e9e4d8;max-width:820px}
  .post.dica .handle{color:#e7c9a6}

  /* Anúncio */
  .post.anuncio{color:#fff;justify-content:flex-end;background:var(--green-deep) center/cover no-repeat}
  .post.anuncio .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(27,43,12,.15) 0%,rgba(15,20,8,.92) 78%)}
  .post.anuncio .content{position:relative;padding:0 90px 150px}
  .post.anuncio .eyebrow{color:var(--gold-soft);margin-bottom:20px}
  .post.anuncio .titulo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;line-height:1.15;margin-bottom:22px}
  .post.anuncio .desc{font-size:26px;line-height:1.5;color:#e9e4d8;max-width:820px}
  .post.anuncio .handle{color:#e7c9a6}

  @media (max-width:960px){
    .app{grid-template-columns:1fr}
    .preview-wrap{width:100%;max-width:460px;height:auto;aspect-ratio:1/1}
    .preview-scale{width:100%;height:100%;transform:none}
    .post{width:100%;height:100%;position:absolute;inset:0}
  }
</style>
</head>
<body>
  <div class="top"><div class="row">
    <a class="back" href="index.html">&larr; In&iacute;cio</a>
    <div style="text-align:center">
      <h1>Gerador de Conte&uacute;do</h1>
      <div class="kicker">Posts prontos para Instagram, no visual do escrit&oacute;rio</div>
    </div>
    <span></span>
  </div></div>

  <div class="app">
    <aside>
      <div class="fmt-tabs" id="fmt-tabs"></div>
      <div class="tpl-tabs" id="tpl-tabs"></div>
      <div class="panel">
        <h2 id="panel-title">Cita&ccedil;&atilde;o</h2>
        <div id="fields"></div>
        <div class="caption-box">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:5px">Legenda do post (opcional)</label>
          <textarea id="legenda" placeholder="Escreva aqui a legenda para colar no Instagram..."></textarea>
          <div class="actions-row">
            <button onclick="copiarLegenda()">Copiar legenda</button>
          </div>
        </div>
        <div class="actions-row">
          <button class="primary" id="btn-baixar" onclick="baixarPNG()">Baixar imagem (PNG)</button>
        </div>
        <p class="field .hint" style="font-size:11px;color:var(--muted);margin-top:10px">Formato quadrado 1080×1080px, pronto para postar no Instagram.</p>
      </div>
    </aside>

    <main class="stage">
      <div class="stage-label">Pré-visualização</div>
      <div class="preview-wrap" id="preview-wrap-el">
        <div class="preview-scale" id="preview-scale"></div>
      </div>
    </main>
  </div>

  <!-- container oculto, tamanho real 1080x1080, usado só para exportar em alta resolução -->
  <div id="export-root" style="position:fixed;left:-9999px;top:0;width:1080px;height:1080px;overflow:hidden;"></div>

const photoState = {}; // key: fieldId -> dataURL

function readFileAsDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

const FORMATS = {
  quadrado: {w:1080, h:1080, label:'Quadrado (Feed 1:1)'},
  feed:     {w:1080, h:1350, label:'Retrato (Feed 4:5)'},
  reels:    {w:1080, h:1920, label:'Capa Reels/Story (9:16)'}
};
let currentFormat = 'quadrado';
let currentTpl = 'citacao';
let formData = {};

function buildFormatTabs(){
  const box=document.getElementById('fmt-tabs');
  box.innerHTML = Object.keys(FORMATS).map(key=>{
    const f=FORMATS[key];
    return `<div class="fmt-tab ${key===currentFormat?'active':''}" onclick="selecionarFormato('${key}')">${f.label}</div>`;
  }).join('');
}
function selecionarFormato(key){
  currentFormat = key;
  buildFormatTabs();
  applyFormatSizing();
}
function applyFormatSizing(){
  const f=FORMATS[currentFormat];
  const wrap=document.getElementById('preview-wrap-el');
  const scaleEl=document.getElementById('preview-scale');
  const exportRoot=document.getElementById('export-root');
  exportRoot.style.width=f.w+'px';
  exportRoot.style.height=f.h+'px';
  scaleEl.style.width=f.w+'px';
  scaleEl.style.height=f.h+'px';
  const displayW = Math.min(460, window.innerWidth<960?window.innerWidth-40:460);
  const scale = displayW / f.w;
  wrap.style.width = displayW+'px';
  wrap.style.height = (f.h*scale)+'px';
  scaleEl.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', ()=>applyFormatSizing());

function buildTabs(){
  const box=document.getElementById('tpl-tabs');
  box.innerHTML = Object.keys(TEMPLATES).map(key=>{
    const t=TEMPLATES[key];
    return `<div class="tpl-tab ${key===currentTpl?'active':''}" onclick="selecionarTemplate('${key}')">
      <span class="ic">${t.icon}</span>${t.label}
    </div>`;
  }).join('');
}

function selecionarTemplate(key){
  currentTpl = key;
  formData = {};
  buildTabs();
  buildFields();
  renderPreview();
}

function buildFields(){
  const t=TEMPLATES[currentTpl];
  document.getElementById('panel-title').textContent = t.label;
  const box=document.getElementById('fields');
  box.innerHTML = t.fields.map(f=>{
    if(f.type==='textarea'){
      return `<div class="field"><label for="fx-${f.id}">${f.label}</label>
        <textarea id="fx-${f.id}" rows="3" placeholder="${f.placeholder||''}" oninput="onFieldInput('${f.id}',this.value)"></textarea></div>`;
    }
    if(f.type==='file'){
      return `<div class="field"><label for="fx-${f.id}">${f.label}</label>
        <div class="filebtn"><input type="file" id="fx-${f.id}" accept="image/*" onchange="onFileInput('${f.id}',this)"><div class="thumb" id="thumb-${f.id}"></div></div></div>`;
    }
    return `<div class="field"><label for="fx-${f.id}">${f.label}</label>
      <input type="text" id="fx-${f.id}" placeholder="${f.placeholder||''}" oninput="onFieldInput('${f.id}',this.value)"></div>`;
  }).join('');
}

function onFieldInput(id,value){ formData[id]=value; renderPreview(); }
async function onFileInput(id, input){
  const file=input.files[0]; if(!file) return;
  const dataUrl = await readFileAsDataURL(file);
  photoState[id]=dataUrl;
  const thumb=document.getElementById('thumb-'+id);
  if(thumb) thumb.style.backgroundImage=`url('${dataUrl}')`;
  renderPreview();
}

function renderPreview(){
  const html = TEMPLATES[currentTpl].render(formData);
  document.getElementById('preview-scale').innerHTML = html;
  document.getElementById('export-root').innerHTML = html;
}

async function baixarPNG(){
  const btn=document.getElementById('btn-baixar');
  btn.disabled=true; btn.textContent='Gerando imagem...';
  try{
    const f=FORMATS[currentFormat];
    if(document.fonts && document.fonts.ready) await document.fonts.ready;
    await new Promise(r=>setTimeout(r,120));
    const node=document.getElementById('export-root').firstElementChild;
    const canvas = await html2canvas(node, {width:f.w, height:f.h, scale:1, useCORS:true, backgroundColor:null});
    const link=document.createElement('a');
    link.download = 'post-'+currentTpl+'-'+currentFormat+'-alinesantos.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(e){
    console.error(e);
    alert('Não foi possível gerar a imagem. Tente novamente.');
  }finally{
    btn.disabled=false; btn.textContent='Baixar imagem (PNG)';
  }
}

function copiarLegenda(){
  const txt=document.getElementById('legenda').value;
  if(!txt.trim()){ alert('Escreva a legenda antes de copiar.'); return; }
  navigator.clipboard.writeText(txt).then(()=>alert('Legenda copiada!')).catch(()=>prompt('Copie manualmente:',txt));
}

buildFormatTabs();
applyFormatSizing();
buildTabs();
buildFields();
renderPreview();
</script>
